<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lord Kasar | بوابة الدخول</title>
    <style>
      :root {
        --primary: #e53e3e;
        --primary-hover: #c53030;
        --bg-dark: #0a0a0d;
        --card-bg: rgba(30, 30, 36, 0.85);
        --text-light: #f4f4f5;
        --text-muted: #a1a1aa;
        --input-bg: rgba(255, 255, 255, 0.05);
        --input-border: rgba(255, 255, 255, 0.1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 50% -20%, #2d1818, var(--bg-dark));
        min-height: 100vh; display: flex; justify-content: center; align-items: center;
        color: var(--text-light); overflow: hidden;
      }

      .glow-blob {
        position: absolute; width: 300px; height: 300px; background: var(--primary);
        border-radius: 50%; filter: blur(100px); opacity: 0.15;
        animation: float 10s infinite alternate ease-in-out; z-index: 0;
      }

      @keyframes float { 0% { transform: translate(-50px, -50px); } 100% { transform: translate(50px, 50px); } }

      .login-container {
        background: var(--card-bg); backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 40px;
        width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative; z-index: 1; transform: translateY(20px); opacity: 0;
        animation: fadeUp 0.6s ease forwards;
      }

      @keyframes fadeUp { to { transform: translateY(0); opacity: 1; } }

      .header { text-align: center; margin-bottom: 35px; }
      .header h1 { font-size: 2em; font-weight: 800; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
      .header p { color: var(--text-muted); font-size: 0.95em; }

      .input-group { margin-bottom: 20px; text-align: right; }
      .input-group label { display: block; margin-bottom: 8px; font-size: 0.9em; font-weight: 600; color: var(--text-muted); }
      .input-group input {
        width: 100%; padding: 14px 16px; background: var(--input-bg); border: 1px solid var(--input-border);
        border-radius: 12px; color: var(--text-light); font-size: 1em; direction: ltr; text-align: left; transition: all 0.3s ease;
      }
      .input-group input:focus { outline: none; border-color: var(--primary); background: rgba(229, 62, 62, 0.05); }

      .btn-submit {
        width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), #b91c1c);
        color: white; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold;
        cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
      }
      .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(229, 62, 62, 0.4); }
      .btn-submit:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; }

      .alert { margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 0.9em; font-weight: 600; text-align: center; display: none; }
      .alert-error { background: rgba(229, 62, 62, 0.1); color: #fc8181; border: 1px solid rgba(229, 62, 62, 0.2); }
      .alert-success { background: rgba(72, 187, 120, 0.1); color: #68d391; border: 1px solid rgba(72, 187, 120, 0.2); }

      .loader { width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 1s infinite linear; display: none; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="glow-blob"></div>
    <div class="login-container">
      <div class="header">
        <h1>Lord Kasar ⚒️</h1>
        <p>تسجيل الدخول </p>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="email" required placeholder="admin@domain.com" />
        </div>
        <div class="input-group">
          <label>كلمة المرور</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="btnText">تسجيل الدخول</span>
          <div class="loader" id="btnLoader"></div>
        </button>
      </form>

      <div id="errorAlert" class="alert alert-error"></div>
      <div id="successAlert" class="alert alert-success"></div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const btn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const loader = document.getElementById("btnLoader");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        btn.disabled = true; btnText.textContent = "جاري التحقق..."; loader.style.display = "block";
        document.getElementById("errorAlert").style.display = "none";
        document.getElementById("successAlert").style.display = "none";

        try {
          const fpPromise = import("https://openfpcdn.io/fingerprintjs/v4").then((fp) => fp.load());
          const fp = await fpPromise;
          const result = await fp.get();
          const visitorId = result.visitorId;

          // تعديل الرابط ليتوافق مع الهوست المباشر
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password, device_token: visitorId }),
          });

          const data = await response.json();

          if (response.ok) {
            document.getElementById("successAlert").textContent = data.message;
            document.getElementById("successAlert").style.display = "block";
            localStorage.setItem("device_token", visitorId);
            setTimeout(() => { window.location.href = "/game"; }, 1500); // التوجيه لصفحة اللعبة
          } else {
            document.getElementById("errorAlert").textContent = data.detail;
            document.getElementById("errorAlert").style.display = "block";
            btn.disabled = false; btnText.textContent = "تسجيل الدخول"; loader.style.display = "none";
          }
        } catch (error) {
          document.getElementById("errorAlert").textContent = "خطأ في الاتصال بالخادم.";
          document.getElementById("errorAlert").style.display = "block";
          btn.disabled = false; btnText.textContent = "تسجيل الدخول"; loader.style.display = "none";
        }
      });
    </script>
  </body>
</html>
