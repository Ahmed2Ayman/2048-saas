<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - الذكاء الاصطناعي</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Tahoma", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #1e1e24 0%, #0a0a0d 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
      }
      .index-container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      h2 {
        margin-bottom: 30px;
        color: #1e1e24;
        font-size: 1.8em;
      }
      .input-group {
        margin-bottom: 20px;
        text-align: right;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
      }
      .input-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 1em;
        transition: all 0.3s;
        text-align: left;
        direction: ltr;
      }
      .input-group input:focus {
        border-color: #e53e3e;
        outline: none;
      }
      .btn-index {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.2em;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .btn-index:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(229, 62, 62, 0.3);
      }
      .btn-index:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .error-msg,
      .success-msg {
        margin-top: 15px;
        font-weight: bold;
        display: none;
        padding: 10px;
        border-radius: 8px;
      }
      .error-msg {
        color: #e53e3e;
        background: #fed7d7;
      }
      .success-msg {
        color: #28a745;
        background: #d4edda;
      }
    </style>
  </head>
  <body>
    <div class="index-container">
      <h2>تسجيل الدخول للخدمة</h2>
      <form id="indexForm">
        <div class="input-group">
          <label>البريد الإلكتروني</label>
          <input
            type="email"
            id="email"
            required
            placeholder="name@example.com"
          />
        </div>
        <div class="input-group">
          <label>كلمة المرور</label>
          <input
            type="password"
            id="password"
            required
            placeholder="••••••••"
          />
        </div>
        <button type="submit" class="btn-index" id="indexBtn">دخول</button>
      </form>
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>
    </div>

    <script>
      document
        .getElementById("indexForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const btn = document.getElementById("indexBtn");
          const errorDiv = document.getElementById("errorMsg");
          const successDiv = document.getElementById("successMsg");

          btn.disabled = true;
          btn.textContent = "جاري التحقق من الجهاز...";
          errorDiv.style.display = "none";
          successDiv.style.display = "none";

          try {
            // الطريقة المعتمدة والصحيحة لتحميل مكتبة البصمة
            const fpPromise =
              import("https://openfpcdn.io/fingerprintjs/v4").then((fp) =>
                fp.load(),
              );
            const fp = await fpPromise;
            const result = await fp.get();
            const visitorId = result.visitorId;

            // إرسال البيانات للسيرفر المحلي (تأكد إن السيرفر شغال)
            const response = await fetch("http://127.0.0.1:8000/api/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: email,
                password: password,
                device_token: visitorId,
              }),
            });

            const data = await response.json();

            if (response.ok) {
              successDiv.textContent = data.message;
              successDiv.style.display = "block";

              // السطر ده هو اللي هيحل المشكلة للأبد
              localStorage.setItem("device_token", visitorId);

              setTimeout(() => {
                window.location.href = "game.html";
              }, 1500);
            } else {
              errorDiv.textContent = data.detail;
              errorDiv.style.display = "block";
              btn.disabled = false;
              btn.textContent = "دخول";
            }
          } catch (error) {
            // السطر ده هيطبع المشكلة الحقيقية في الكونسول
            console.error("الخطأ الحقيقي هو:", error);

            errorDiv.textContent =
              "حدث خطأ. اضغط F12 وافتح الـ Console لمعرفة السبب الحقيقي.";
            errorDiv.style.display = "block";
            btn.disabled = false;
            btn.textContent = "دخول";
          }
        });
    </script>
  </body>
</html>
